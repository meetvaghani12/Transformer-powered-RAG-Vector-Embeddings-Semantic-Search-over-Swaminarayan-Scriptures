<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1e1a0e"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <linearGradient id="symbolGrad" x1="30%" y1="10%" x2="70%" y2="90%">
      <stop offset="0%" stop-color="#f7edcc"/>
      <stop offset="50%" stop-color="#e8d5a0"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="180" height="180" rx="34" fill="url(#bgGlow)"/>

  <!-- Subtle border ring -->
  <rect width="180" height="180" rx="34" fill="none" stroke="#e8d5a0" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- OM glyph using text — universally supported on all modern platforms -->
  <text
    x="90"
    y="126"
    font-family="'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Mangal', 'Sanskrit Text', 'Arial Unicode MS', serif"
    font-size="108"
    font-weight="400"
    text-anchor="middle"
    fill="url(#symbolGrad)"
    filter="url(#softGlow)"
  >ॐ</text>
</svg>
